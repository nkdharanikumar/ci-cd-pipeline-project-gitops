name: CI-CD-Pipeline

on:
push:
branches:
- main

env:
AWS_REGION: ${{ secrets.AWS_REGION }}
ECR_REPOSITORY: flask-cicd
ECR_REGISTRY: 324621154851.dkr.ecr.ap-south-1.amazonaws.com

jobs:
build-test-scan-deploy:

runs-on: ubuntu-latest

steps:

- name: Checkout Code
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.11"

- name: Install Dependencies
  run: |
    pip install -r requirements.txt
    pip install pytest

- name: Run Unit Tests
  run: |
    pytest -v

- name: Configure AWS Credentials
  uses: aws-actions/configure-aws-credentials@v4
  with:
    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    aws-region: ${{ secrets.AWS_REGION }}

- name: Login to Amazon ECR
  id: login-ecr
  uses: aws-actions/amazon-ecr-login@v2

- name: Build Docker Image
  run: |
    docker build -t $ECR_REPOSITORY:${{ github.sha }} .

- name: Install Trivy
  run: |
    sudo apt-get update
    sudo apt-get install -y wget
    wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb
    sudo dpkg -i trivy_0.65.0_Linux-64bit.deb

- name: Security Scan
  run: |
    trivy image --severity HIGH,CRITICAL --exit-code 1 \
    $ECR_REPOSITORY:${{ github.sha }}

- name: Tag Docker Image
  run: |
    docker tag \
    $ECR_REPOSITORY:${{ github.sha }} \
    $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

- name: Push Docker Image
  run: |
    docker push \
    $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

- name: Clone GitOps Repository
  run: |
    git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/nkdharanikumar/gitops-repo.git

- name: Update Deployment Manifest
  run: |
    sed -i "s|image: .*|image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}|g" \
    gitops-repo/k8s/deployment.yaml

- name: Commit Changes
  run: |
    cd gitops-repo

    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

    git add .

    git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"

    git push

